<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>配方管理系统</title>
    <link rel="stylesheet" href="./styles/main.css">
</head>

<body>
    <div class="shell">
        <aside class="sidebar">
            <div class="brand-panel">
                <div class="brand-header">
                    <div class="brand-mark" aria-hidden="true">R</div>
                    <div class="brand-text">
                        <h1>配方管理系统</h1>
                        <p>材料、配方与库存的一体化工作台</p>
                    </div>
                </div>
                <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="收起导航栏"
                    aria-expanded="true" title="收起导航栏">
                    <span class="toggle-icon" aria-hidden="true">←</span>
                </button>
            </div>

            <nav class="sidebar-nav" aria-label="主导航">
                <a href="#dashboard-section" class="nav-link active" data-target="dashboard-section">
                    <span class="nav-icon" aria-hidden="true">◫</span>
                    <span class="nav-label">总览</span>
                </a>
                <a href="#inventory-section" class="nav-link" data-target="inventory-section">
                    <span class="nav-icon" aria-hidden="true">◨</span>
                    <span class="nav-label">库存</span>
                </a>
                <a href="#formula-section" class="nav-link" data-target="formula-section">
                    <span class="nav-icon" aria-hidden="true">◧</span>
                    <span class="nav-label">配方设计</span>
                </a>
                <a href="#library-section" class="nav-link" data-target="library-section">
                    <span class="nav-icon" aria-hidden="true">◎</span>
                    <span class="nav-label">配方库</span>
                </a>
            </nav>
        </aside>

        <main class="main">
            <section id="dashboard-section" class="section active">
                <div class="hero">
                    <div class="hero-grid" id="hero-metrics"></div>
                </div>

                <div class="panel-grid">
                    <article class="panel">
                        <div class="panel-header">
                            <h3>分类分布</h3>
                        </div>
                        <div class="chip-group" id="category-summary"></div>
                    </article>

                    <article class="panel">
                        <div class="panel-header">
                            <h3>库存风险</h3>
                        </div>
                        <div class="stack-list" id="risk-list"></div>
                    </article>
                </div>
            </section>

            <section id="inventory-section" class="section">
                <div class="section-head">
                    <h3>原材料库</h3>
                    <div class="inline-actions">
                        <input type="search" id="inventory-search" class="text-input search-input"
                            placeholder="搜索名称、牌号、供应商">
                    </div>
                </div>

                <div class="filters">
                    <select id="family-filter" class="text-input">
                        <option value="all">全部基材</option>
                    </select>
                    <select id="category-filter" class="text-input">
                        <option value="all">全部分类</option>
                    </select>
                    <select id="status-filter" class="text-input">
                        <option value="all">全部状态</option>
                        <option value="healthy">库存健康</option>
                        <option value="warning">临近预警</option>
                        <option value="critical">急需补料</option>
                    </select>
                </div>

                <div class="content-split">
                    <article class="panel">
                        <div class="table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>物料名称</th>
                                        <th>分类</th>
                                        <th>基材</th>
                                        <th>库存</th>
                                        <th>单价</th>
                                        <th>状态</th>
                                    </tr>
                                </thead>
                                <tbody id="inventory-table-body"></tbody>
                            </table>
                        </div>
                    </article>

                    <article class="panel detail-panel">
                        <div class="panel-header">
                            <h3 id="material-detail-name">请选择物料</h3>
                        </div>
                        <div id="material-detail" class="detail-body"></div>
                    </article>
                </div>
            </section>

            <section id="formula-section" class="section">
                <div class="section-head">
                    <h3>配方设计</h3>
                    <div class="inline-actions">
                        <button class="ghost-btn" id="add-component-btn">添加配方项</button>
                        <button class="primary-btn" id="save-formula-btn">保存到配方库</button>
                    </div>
                </div>

                <div class="formula-layout">
                    <article class="panel form-panel">
                        <div class="form-grid">
                            <label>
                                <span>配方名称</span>
                                <input id="formula-name" class="text-input" type="text"
                                    placeholder="例如：PBT GF30 阻燃连接器料">
                            </label>
                            <label>
                                <span>应用方向</span>
                                <input id="formula-application" class="text-input" type="text"
                                    placeholder="连接器、汽车电器、家电骨架">
                            </label>
                            <label>
                                <span>基材体系</span>
                                <select id="formula-family" class="text-input">
                                    <option value="PBT">PBT</option>
                                    <option value="PET">PET</option>
                                    <option value="PA6">PA6</option>
                                    <option value="PA66">PA66</option>
                                </select>
                            </label>
                            <label>
                                <span>加工工艺</span>
                                <select id="formula-process" class="text-input">
                                    <option value="注塑">注塑</option>
                                    <option value="挤出">挤出</option>
                                    <option value="共混造粒">共混造粒</option>
                                </select>
                            </label>
                        </div>

                        <label class="full-width">
                            <span>设计目标</span>
                            <textarea id="formula-target" class="text-input textarea"
                                placeholder="例如：GF30、V-0、尺寸稳定、耐热、流动性平衡"></textarea>
                        </label>

                        <div class="table-wrap formula-table-wrap">
                            <table>
                                <thead>
                                    <tr>
                                        <th>原材料</th>
                                        <th>分类</th>
                                        <th>占比 %</th>
                                        <th>单价</th>
                                        <th>小计</th>
                                        <th>备注</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="formula-items-body"></tbody>
                            </table>
                        </div>
                    </article>

                    <aside class="formula-summary">
                        <article class="panel">
                            <div class="panel-header">
                                <h3>汇总</h3>
                            </div>
                            <div class="summary-metrics" id="formula-summary-metrics"></div>
                        </article>
                    </aside>
                </div>
            </section>

            <section id="library-section" class="section">
                <div class="section-head">
                    <h3>配方库</h3>
                    <div class="inline-actions">
                        <input type="search" id="library-search" class="text-input search-input"
                            placeholder="搜索配方、应用或状态">
                    </div>
                </div>

                <div class="library-grid" id="library-grid"></div>
            </section>
        </main>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
